<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gradiente do fundo squircle -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>

    <!-- Gradiente da asa esquerda / mente (azul para roxo) -->
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>

    <!-- Gradiente da asa direita / métricas (azul para verde) -->
    <linearGradient id="metricsGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#10B981" />
    </linearGradient>

    <!-- Sombra suave para o ícone central -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5" />
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#3B82F6" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Fundo Squircle Estilo Apple -->
  <rect width="512" height="512" rx="120" fill="url(#bgGrad)" />

  <!-- Detalhe sutil de borda reflexiva -->
  <rect x="2" y="2" width="508" height="508" rx="118" fill="none" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="4" />

  <!-- Grupo do Ícone Central com Efeito de Glow -->
  <g filter="url(#glow)" transform="translate(4, 0)">
    <!-- Asa Esquerda (Saúde Mental - Formas Fluidas de Cérebro/Pensamento) -->
    <path d="M 230 160 
             C 170 160, 130 200, 130 260 
             C 130 320, 170 352, 210 352 
             C 240 352, 245 320, 235 300 
             C 225 280, 200 270, 200 250 
             C 200 230, 220 210, 250 210 
             C 255 210, 256 160, 230 160 Z" 
          fill="url(#brainGrad)" 
          opacity="0.9" />

    <!-- Asa Direita (Métricas - Gráfico de Barras Flutuando/Crescente e Nós de Dados) -->
    <path d="M 282 352 
             C 342 352, 382 312, 382 252 
             C 382 192, 342 160, 302 160 
             C 272 160, 267 192, 277 212 
             C 287 232, 312 242, 312 262 
             C 312 282, 292 302, 262 302 
             C 257 302, 256 352, 282 352 Z" 
          fill="url(#metricsGrad)" 
          opacity="0.95" />

    <!-- Conexão Central (Sinal de Infinito de Fusão / Sinapse de Dados) -->
    <path d="M 230 210 
             C 240 210, 245 220, 250 230
             C 255 240, 260 250, 270 250
             C 280 250, 285 240, 290 230
             C 295 220, 300 210, 310 210" 
          stroke="white" 
          stroke-width="12" 
          stroke-linecap="round" 
          fill="none" 
          opacity="0.3" />

    <!-- Pontos de Dados Conectados (Nós do Sistema de Métricas) -->
    <circle cx="282" cy="180" r="12" fill="white" />
    <circle cx="350" cy="225" r="10" fill="white" />
    <circle cx="340" cy="300" r="14" fill="white" />
    <circle cx="230" cy="330" r="12" fill="white" />
    <circle cx="170" cy="220" r="14" fill="white" />
  </g>
</svg>
